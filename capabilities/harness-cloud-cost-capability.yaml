      path: /ccm/api/perspective
      operations:
      - name: listperspectives
        method: GET
        description: List perspectives
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createperspective
        method: POST
        description: Create a perspective
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ccm-api-perspective-perspectiveid
