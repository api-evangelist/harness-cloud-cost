  - type: http
    namespace: harness-cloud-cost
    baseUri: https://app.harness.io
    description: Harness Cloud Cost Management API HTTP API.
    authentication:
      type: apikey
      in: header
      name: x-api-key
      value: '{{HARNESS_CLOUD_COST_TOKEN}}'
    resources:
