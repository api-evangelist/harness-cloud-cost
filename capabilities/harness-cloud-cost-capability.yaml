        method: GET
        description: Get a perspective
        inputParameters:
        - name: perspectiveId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateperspective
        method: PUT
        description: Update a perspective
        inputParameters:
        - name: perspectiveId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteperspective
        method: DELETE
        description: Delete a perspective
        inputParameters:
        - name: perspectiveId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
