    port: 9090
    transport: http
    description: MCP adapter for Harness Cloud Cost Management API — Budgets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-budgets
      description: List budgets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harness-cloud-cost-budgets.listbudgets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-budget
      description: Create a budget
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: harness-cloud-cost-budgets.createbudget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-budget
      description: Get a budget
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: harness-cloud-cost-budgets.getbudget
      with:
        budgetId: tools.budgetId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-budget
      description: Update a budget
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: harness-cloud-cost-budgets.updatebudget
      with:
        budgetId: tools.budgetId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-budget
      description: Delete a budget
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: harness-cloud-cost-budgets.deletebudget
      with:
        budgetId: tools.budgetId
      outputParameters:
      - type: object
        mapping: $.
