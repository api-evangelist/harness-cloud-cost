    namespace: harness-cloud-cost-budgets
    baseUri: https://app.harness.io
    description: Harness Cloud Cost Management API — Budgets business capability. Self-contained, no shared references.
    resources:
    - name: ccm-api-budgets
      path: /ccm/api/budgets
      operations:
      - name: listbudgets
        method: GET
        description: List budgets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createbudget
        method: POST
        description: Create a budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: ccm-api-budgets-budgetId
      path: /ccm/api/budgets/{budgetId}
      operations:
      - name: getbudget
        method: GET
        description: Get a budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          required: true
      - name: updatebudget
        method: PUT
        description: Update a budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebudget
        method: DELETE
        description: Delete a budget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: budgetId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.HARNESS_CLOUD_COST_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: harness-cloud-cost-budgets-rest
    port: 8080
    description: REST adapter for Harness Cloud Cost Management API — Budgets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ccm/api/budgets
      name: ccm-api-budgets
      description: REST surface for ccm-api-budgets.
      operations:
      - method: GET
        name: listbudgets
        description: List budgets
        call: harness-cloud-cost-budgets.listbudgets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbudget
        description: Create a budget
        call: harness-cloud-cost-budgets.createbudget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ccm/api/budgets/{budgetid}
      name: ccm-api-budgets-budgetid
      description: REST surface for ccm-api-budgets-budgetId.
      operations:
      - method: GET
        name: getbudget
        description: Get a budget
        call: harness-cloud-cost-budgets.getbudget
        with:
          budgetId: rest.budgetId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebudget
        description: Update a budget
        call: harness-cloud-cost-budgets.updatebudget
        with:
          budgetId: rest.budgetId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
