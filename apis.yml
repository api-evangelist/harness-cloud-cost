aid: harness-cloud-cost
name: Harness Cloud Cost Management
description: >-
  Harness Cloud Cost Management (CCM) provides intelligent cloud cost optimization with AI-driven recommendations,
  customizable cost perspectives, budgets, anomaly detection, and chargeback / showback through cost categories. CCM
  ingests cost data from AWS, Azure, GCP, and Kubernetes clusters and exposes a REST API on the Harness platform for
  FinOps automation.
